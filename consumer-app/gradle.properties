org.gradle.jvmargs=-Xmx3072m -Dfile.encoding=UTF-8
org.gradle.caching=true
# Compile Kotlin inside the Gradle daemon instead of spawning a separate Kotlin daemon: on some
# Windows setups that daemon dies on startup ("terminated unexpectedly on startup"). Slightly slower
# incremental builds, but avoids the crash. Remove if the Kotlin daemon works for you.
kotlin.compiler.execution.strategy=in-process
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Use the already-installed android-36 platform; AGP 8.7 doesn't "certify" it yet -> silence the warning.
android.suppressUnsupportedCompileSdk=36
